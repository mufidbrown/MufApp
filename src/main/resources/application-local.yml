server:
  port: 8081
  compression:
    enabled: true
    mime-types: text/html, text/xml, text/plain, text/css, text/javascript, application/javascript, application/json, application/xml
    min-response-size: 2KB
  http2:
    enabled: true
  server-header: MuFID
  servlet:
    session:
      timeout: 30m

logging:
  file:
    name: log/app.log
  level:
    ROOT: INFO
    org:
      com.app: INFO
    com:
      zaxxer:
        hikari.HikariConfig: DEBUG

app:
  scheduler_bootstrap: false
  parameter:
    UPLOAD_PATH: D:/work/product/uploads/
    CACHE_PATH: D:/work/product/cache/
    CAPTCHA_ENABLE: false
    IS_SECURITY_ENABLE: false

